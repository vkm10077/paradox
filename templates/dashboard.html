<!DOCTYPE html>
<html>
<head>
    <title>FYERS Professional Dashboard</title>
    <meta http-equiv="refresh" content="10">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        .card {
            background: #111827;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.4);
        }

        h2 {
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #020617;
            border-radius: 12px;
            overflow: hidden;
        }

        th {
            background: #1e293b;
            color: #e5e7eb;
            padding: 12px;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #334155;
        }

        .green {
            color: #22c55e;
            font-weight: bold;
        }

        .red {
            color: #ef4444;
            font-weight: bold;
        }

        .symbol {
            font-weight: bold;
            color: #38bdf8;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>📊 FYERS Professional Trading Dashboard</h2>

    <table>
        <tr>
            <th>Symbol</th>
            <th>LTP</th>
            <th>Change</th>
            <th>Change %</th>
            <th>Open</th>
            <th>High</th>
            <th>Low</th>
            <th>Prev Close</th>
        </tr>

        {% for r in rows %}
        <tr>
            <td class="symbol">{{ r.symbol }}</td>
            <td>{{ r.price }}</td>

            <td class="{% if r.change >= 0 %}green{% else %}red{% endif %}">
                {{ r.change }}
            </td>

            <td class="{% if r.change_pct >= 0 %}green{% else %}red{% endif %}">
                {{ r.change_pct }}%
            </td>

            <td>{{ r.open }}</td>
            <td>{{ r.high }}</td>
            <td>{{ r.low }}</td>
            <td>{{ r.prev_close }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
